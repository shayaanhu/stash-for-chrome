<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
@font-face {
  font-family: 'Fraunces Variable';
  src: url('../../node_modules/@fontsource-variable/fraunces/files/fraunces-latin-wght-normal.woff2') format('woff2');
  font-weight: 100 900; font-style: normal;
}
@font-face {
  font-family: 'Plus Jakarta Sans Variable';
  src: url('../../node_modules/@fontsource-variable/plus-jakarta-sans/files/plus-jakarta-sans-latin-wght-normal.woff2') format('woff2');
  font-weight: 200 800; font-style: normal;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 1280px; height: 800px; overflow: hidden;
  background: #1C336B;
  font-family: 'Plus Jakarta Sans Variable', system-ui, sans-serif;
  position: relative;
}
.bg {
  position: absolute; inset: 0; z-index: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 28px 28px;
}
.bg-glow {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 50% 55% at 8% 8%, rgba(40,92,204,0.3) 0%, transparent 58%),
    radial-gradient(ellipse 40% 50% at 92% 92%, rgba(16,28,56,0.9) 0%, transparent 55%);
}
.left {
  position: absolute; left: 88px; top: 0; bottom: 0; width: 490px;
  display: flex; flex-direction: column; justify-content: center; z-index: 10;
}
.brand-pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,250,234,0.1); border: 1px solid rgba(255,250,234,0.18);
  border-radius: 999px; padding: 5px 14px 5px 5px;
  width: fit-content; margin-bottom: 36px;
}
.logo-mini {
  width: 24px; height: 24px; border-radius: 6px;
  background: #F6EBCF; border: 1px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden; flex-shrink: 0;
}
.logo-mini::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: #2A55B1;
}
.logo-s {
  font-family: 'Fraunces Variable', Georgia, serif;
  font-size: 12px; font-weight: 700; color: #1D3261; margin-left: 2px;
  font-variation-settings: 'opsz' 9, 'wght' 700;
}
.brand-name {
  font-family: 'Fraunces Variable', Georgia, serif;
  font-size: 13.5px; font-weight: 600; color: rgba(255,250,234,0.9);
  font-variation-settings: 'opsz' 12, 'wght' 600;
}
h1 {
  font-family: 'Fraunces Variable', Georgia, serif;
  font-size: 58px; font-weight: 700; line-height: 1.07;
  color: #FFFEFA; letter-spacing: -0.5px;
  font-variation-settings: 'opsz' 44, 'wght' 700;
  margin-bottom: 24px;
}
.sub {
  font-size: 18px; font-weight: 400; line-height: 1.65;
  color: rgba(255,250,234,0.65); max-width: 370px;
}
.days-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,200,80,0.12); border: 1px solid rgba(255,200,80,0.25);
  border-radius: 999px; padding: 8px 18px;
  margin-top: 28px; width: fit-content;
  color: #FFD580;
  font-size: 15px; font-weight: 600;
}
.right {
  position: absolute; right: 50px; top: 50%;
  transform: translateY(-50%) rotate(-2.5deg);
  z-index: 10;
}
.popup {
  width: 460px; background: #FFFEFA; border-radius: 20px; overflow: hidden;
  box-shadow:
    0 70px 140px rgba(0,0,0,0.55),
    0 24px 48px rgba(0,0,0,0.28),
    0 4px 10px rgba(0,0,0,0.18),
    0 0 0 1px rgba(255,255,255,0.1);
}
.popup-canvas {
  background:
    radial-gradient(ellipse 80% 55% at 25% 12%, rgba(249,245,236,0.95) 0%, transparent 62%),
    radial-gradient(ellipse 60% 75% at 82% 88%, rgba(235,229,212,0.65) 0%, transparent 55%),
    #F4F0E4;
}
.toolbar {
  display: flex; align-items: center; gap: 8px; padding: 16px 16px 8px;
}
.search-field {
  flex: 1; height: 34px; background: #FFFEFA;
  border: 1px solid #E0D8C4; border-radius: 999px;
  display: flex; align-items: center; padding: 0 12px; gap: 7px;
  box-shadow: inset 0 1px 3px rgba(28,51,107,0.07);
}
.search-text { font-size: 12.5px; color: #9BAAC8; }
.tbtn {
  width: 34px; height: 34px; border-radius: 999px;
  background: linear-gradient(160deg, #FFFFFF, #F5F0E8);
  border: 1px solid #E0D8C4; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 1px 3px rgba(28,51,107,0.08), inset 0 1px 0 rgba(255,255,255,0.95);
}
.nav { padding: 0 16px 12px; }
.nav-track {
  display: inline-flex; background: rgba(28,51,107,0.09);
  border-radius: 999px; padding: 3px;
  box-shadow: inset 0 2px 5px rgba(20,35,80,0.16);
}
.nav-item {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 20px; border-radius: 999px;
  font-size: 12.5px; font-weight: 600; color: #4A5E92;
  min-width: 94px; justify-content: center;
}
.nav-item.active {
  background: linear-gradient(160deg, #FFFFFF 0%, #FFFAF3 100%);
  color: #1C336B;
  box-shadow: 0 1px 4px rgba(28,51,107,0.14), 0 0 0 0.5px rgba(28,51,107,0.06);
}
.badge { background: rgba(40,92,204,0.12); color: #285CCC; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 999px; }
/* Trash section label */
.section-label {
  padding: 0 14px 8px;
  font-size: 11px; font-weight: 700; color: #9BAAC8;
  text-transform: uppercase; letter-spacing: 0.08em;
}
/* Trash cards */
.cards { padding: 0 12px 10px; display: flex; flex-direction: column; gap: 7px; }
.card {
  background: #FFFEFA; border: 1px solid #E0D8C4; border-radius: 15px;
  padding: 12px 13px 12px 14px; display: flex; align-items: center; gap: 10px;
  box-shadow: 0 1px 4px rgba(28,51,107,0.06), inset 3px 0 0 0 #C4925A;
}
.card-body { flex: 1; min-width: 0; }
.card-name {
  font-size: 13.5px; font-weight: 700; color: #1C336B;
  margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.card-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.favicons { display: flex; }
.fav {
  width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid #FFFEFA;
  margin-left: -3px; display: flex; align-items: center; justify-content: center;
  font-size: 7.5px; font-weight: 800; color: white; flex-shrink: 0;
}
.fav:first-child { margin-left: 0; }
.tab-count { font-size: 12px; color: #6B7EB5; }
.trash-timer {
  font-size: 10.5px; font-weight: 600; color: #9B7018;
  background: rgba(212,169,106,0.16); border: 1px solid rgba(212,169,106,0.28);
  padding: 2px 7px; border-radius: 999px;
}
.undo-btn {
  width: 36px; height: 36px; border-radius: 999px;
  background: linear-gradient(160deg, #FFFFFF, #F2EDE4);
  border: 1px solid #E0D8C4;
  box-shadow: 0 2px 5px rgba(28,51,107,0.1), inset 0 1px 0 rgba(255,255,255,0.9);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
/* Empty trash button */
.empty-wrap { padding: 4px 12px 16px; }
.empty-btn {
  width: 100%; height: 40px;
  background: rgba(220,50,50,0.07);
  border: 1px solid rgba(220,50,50,0.18);
  border-radius: 999px; display: flex; align-items: center; justify-content: center;
  gap: 7px; color: #AA2020; font-size: 13.5px; font-weight: 600;
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-glow"></div>

<div class="left">
  <div class="brand-pill">
    <div class="logo-mini"><span class="logo-s">S</span></div>
    <span class="brand-name">Stash</span>
  </div>
  <h1>Delete without<br>fear.</h1>
  <p class="sub">Trashed sessions stick around for 30 days. Restore anything you regret, any time.</p>
  <div class="days-badge">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#FFD580" stroke-width="1.4"/><path d="M7.5 4v4l2.5 2" stroke="#FFD580" stroke-width="1.4" stroke-linecap="round"/></svg>
    30-day safety window
  </div>
</div>

<div class="right">
  <div class="popup">
    <div class="popup-canvas">
      <div class="toolbar">
        <div class="search-field">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="5.5" cy="5.5" r="4" stroke="#8899BB" stroke-width="1.5"/><line x1="8.8" y1="8.8" x2="11.5" y2="11.5" stroke="#8899BB" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span class="search-text">Search sessions...</span>
        </div>
        <div class="tbtn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 4h12M4 4V2M1 7h12M10 7V5M1 10h12M7 10v2" stroke="#4A5E92" stroke-width="1.3" stroke-linecap="round"/></svg>
        </div>
      </div>
      <div class="nav">
        <div class="nav-track">
          <div class="nav-item">Library</div>
          <div class="nav-item active">Trash <span class="badge">2</span></div>
        </div>
      </div>
      <div class="section-label">Deleted sessions</div>
      <div class="cards">
        <div class="card">
          <div class="card-body">
            <div class="card-name">Old Designs — Archive</div>
            <div class="card-row">
              <div class="favicons">
                <div class="fav" style="background:#F24E1E">F</div>
                <div class="fav" style="background:#4285F4">G</div>
                <div class="fav" style="background:#252525">N</div>
              </div>
              <span class="tab-count">5 tabs</span>
              <span class="trash-timer">27 days left</span>
            </div>
          </div>
          <div class="undo-btn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4 3l-3 3 3 3M1 6h7a4 4 0 010 8H5" stroke="#1C336B" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
        <div class="card">
          <div class="card-body">
            <div class="card-name">Research — v1 Notes</div>
            <div class="card-row">
              <div class="favicons">
                <div class="fav" style="background:#D97757">A</div>
                <div class="fav" style="background:#10A37F">O</div>
                <div class="fav" style="background:#FF6600">H</div>
              </div>
              <span class="tab-count">7 tabs</span>
              <span class="trash-timer">14 days left</span>
            </div>
          </div>
          <div class="undo-btn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4 3l-3 3 3 3M1 6h7a4 4 0 010 8H5" stroke="#1C336B" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
      </div>
      <div class="empty-wrap">
        <div class="empty-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2h4v2M12 4l-1 8H3L2 4" stroke="#AA2020" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Empty trash
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
