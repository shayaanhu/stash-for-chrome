<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
@font-face {
  font-family: 'Fraunces Variable';
  src: url('../../node_modules/@fontsource-variable/fraunces/files/fraunces-latin-wght-normal.woff2') format('woff2');
  font-weight: 100 900; font-style: normal;
}
@font-face {
  font-family: 'Plus Jakarta Sans Variable';
  src: url('../../node_modules/@fontsource-variable/plus-jakarta-sans/files/plus-jakarta-sans-latin-wght-normal.woff2') format('woff2');
  font-weight: 200 800; font-style: normal;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 440px; height: 280px; overflow: hidden;
  background: #1C336B;
  font-family: 'Plus Jakarta Sans Variable', system-ui, sans-serif;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.bg-dots {
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.045) 1px, transparent 1px);
  background-size: 24px 24px;
}
.bg-glow {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 70% at 15% 20%, rgba(40,92,204,0.4) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 85% 85%, rgba(12,22,50,0.9) 0%, transparent 55%);
}
.content {
  position: relative; z-index: 10;
  display: flex; align-items: center; gap: 32px;
  padding: 0 44px;
}
/* Logo icon */
.icon {
  width: 80px; height: 80px; border-radius: 20px;
  background: #F6EBCF; flex-shrink: 0;
  position: relative; overflow: hidden;
  box-shadow: 0 12px 32px rgba(0,0,0,0.4), 0 3px 8px rgba(0,0,0,0.25);
}
.icon::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: round(80px * 0.095, 1px);
  background: #2A55B1;
}
.icon-s {
  font-family: 'Fraunces Variable', Georgia, serif;
  font-size: 44px; font-weight: 700; color: #1D3261;
  font-variation-settings: 'opsz' 44, 'wght' 700;
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  padding-left: 8px;
}
/* Text */
.text { display: flex; flex-direction: column; gap: 6px; }
.wordmark {
  font-family: 'Fraunces Variable', Georgia, serif;
  font-size: 38px; font-weight: 600; color: #FFFEFA; line-height: 1;
  font-variation-settings: 'opsz' 44, 'wght' 600;
  letter-spacing: -0.3px;
}
.tagline {
  font-size: 14px; font-weight: 400; line-height: 1.5;
  color: rgba(255,250,234,0.6);
}
</style>
</head>
<body>
<div class="bg-dots"></div>
<div class="bg-glow"></div>
<div class="content">
  <div class="icon">
    <span class="icon-s">S</span>
  </div>
  <div class="text">
    <div class="wordmark">Stash</div>
    <div class="tagline">Save your tabs.<br>Come back later.</div>
  </div>
</div>
</body>
</html>
